name: Auto Versioning & Release

on:
  push:
    branches:
      - main

jobs:
  auto-release:
    name: Determine Version & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Determine New Version (Conventional Commits)
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          create_annotated_tag: false
          dry_run: true  # Hanya hitung versi, belum buat tag

      - name: 📦 Bump package.json Version
        run: |
          NEW_VERSION=${{ steps.tag_version.outputs.new_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version $NEW_VERSION --no-git-tag-version
          git add package.json
          git commit -m "chore(release): bump version to v$NEW_VERSION [skip ci]"
          git push origin main

      - name: 🏷️ Create & Push Tag
        run: |
          TAG=v${{ steps.tag_version.outputs.new_version }}
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag_version.outputs.new_version }}
          name: Versi v${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
