name: Auto Versioning & Release

on:
  push:
    branches:
      - main

jobs:
  auto-release:
    name: Determine Version & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Determine New Version (Conventional Commits)
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          create_annotated_tag: false
          dry_run: true  # Hanya hitung versi & changelog, belum buat tag

      - name: 📝 Update CHANGELOG.md & package.json
        env:
          CHANGELOG_ENTRY: ${{ steps.tag_version.outputs.changelog }}
          NEW_VERSION: ${{ steps.tag_version.outputs.new_version }}
        run: |
          # Write new entry to temp file (avoids shell word-splitting from commit messages)
          {
            echo "## [v${NEW_VERSION}] - $(date +'%Y-%m-%d')"
            echo ""
            printf '%s\n' "${CHANGELOG_ENTRY}"
            echo ""
            echo "---"
            echo ""
          } > /tmp/new_entry.md

          cat /tmp/new_entry.md CHANGELOG.md > /tmp/CHANGELOG.md && mv /tmp/CHANGELOG.md CHANGELOG.md

          # Bump package.json version
          npm version $NEW_VERSION --no-git-tag-version

          # Commit both files back
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git push origin main

      - name: 🏷️ Create & Push Tag
        run: |
          TAG=v${{ steps.tag_version.outputs.new_version }}
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag_version.outputs.new_version }}
          name: Versi v${{ steps.tag_version.outputs.new_version }}
          body: ${{ steps.tag_version.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

